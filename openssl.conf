# Workaround for MongoDB Atlas + Node.js 17+ (OpenSSL 3) SSL alert 80
# Use: NODE_OPTIONS=--openssl-config=./openssl.conf npm run dev
openssl_conf = openssl_init

[openssl_init]
ssl_conf = ssl_sect

[ssl_sect]
system_default = system_default_sect

[system_default_sect]
Options = UnsafeLegacyRenegotiation
